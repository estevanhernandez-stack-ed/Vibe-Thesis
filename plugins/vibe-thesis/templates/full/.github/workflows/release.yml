name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build + attach example PDF render
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Pandoc + LuaLaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-luatex texlive-latex-extra texlive-fonts-recommended texlive-bibtex-extra biber

      - name: Compile tokens
        run: npm run compile:tokens

      - name: Render example chapter
        run: |
          if [ -d "examples/dissertation-chapter" ] && [ -f "scripts/render-pdf.js" ]; then
            cd examples/dissertation-chapter && npm run render:pdf
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            examples/dissertation-chapter/08_OUTPUT/pdf/*.pdf
